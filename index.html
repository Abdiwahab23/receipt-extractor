<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReceiptAI | Intelligence at your service</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>

<body>
  <div class="container">
    <div class="app-card">
      <header>
        <h1>ReceiptAI</h1>
        <p class="subtitle">Extract data from your receipts in seconds</p>
        <button id="view-all-btn" class="btn view-all-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-list">
            <line x1="8" y1="6" x2="21" y2="6" />
            <line x1="8" y1="12" x2="21" y2="12" />
            <line x1="8" y1="18" x2="21" y2="18" />
            <line x1="3" y1="6" x2="3.01" y2="6" />
            <line x1="3" y1="12" x2="3.01" y2="12" />
            <line x1="3" y1="18" x2="3.01" y2="18" />
          </svg>
          View all receipts
        </button>
      </header>

      <div class="grid">
        <!-- Left Side: Upload -->
        <div class="upload-container">
          <input type="file" id="file-input" accept="image/*" hidden />
          <label for="file-input" class="upload-area" id="drop-zone">
            <div id="upload-placeholder">
              <div class="upload-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                  class="lucide lucide-upload-cloud">
                  <path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242" />
                  <path d="M12 12v9" />
                  <path d="m16 16-4-4-4 4" />
                </svg>
              </div>
              <h3>Drop receipt here</h3>
              <p>or click to browse</p>
            </div>
            <img id="preview-img" alt="Receipt Preview" />
            <div class="scan-line" id="scan-line"></div>
            <div class="loading-overlay" id="loading-overlay">
              <div class="spinner"></div>
              <p>AI is scanning...</p>
            </div>
          </label>
        </div>

        <!-- Right Side: Form -->
        <div class="form-section">
          <div style="display: flex; align-items: center; margin-bottom: 0.5rem;">
            <h2 style="font-size: 1.25rem;">Extracted Data</h2>
            <div id="status-badge" class="status-badge">Waiting</div>
          </div>

          <form id="receipt-form">
            <div class="form-group">
              <label for="merchant">Merchant Name</label>
              <input type="text" id="merchant" placeholder="e.g. Starbucks" required>
            </div>

            <div class="form-group">
              <label for="date">Date</label>
              <input type="date" id="date" required>
            </div>

            <div class="form-group">
              <label for="total">Total Amount</label>
              <input type="number" step="0.01" id="total" placeholder="0.00" required>
            </div>

            <div class="form-group">
              <label for="currency">Currency</label>
              <input type="text" id="currency" placeholder="e.g. USD" required>
            </div>

            <button type="submit" class="btn" id="submit-btn" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="lucide lucide-check-circle">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                <polyline points="22 4 12 14.01 9 11.01" />
              </svg>
              Verify & Submit
            </button>
          </form>
          <div id="success-msg">Data saved successfully!</div>
        </div>
      </div>
    </div>
  </div>

  <!-- View All Receipts Modal -->
  <div id="receipts-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>All Scanned Receipts</h2>
        <button id="close-modal" class="close-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-x">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </div>

      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th>Date</th>
              <th>Merchant</th>
              <th>Amount</th>
              <th>Currency</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="receipts-table-body">
            <!-- Data will be injected here -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
